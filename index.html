<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#e9e6fb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="实验台">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>实验台</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- 液态玻璃折射滤镜：复刻 Apple Liquid Glass 的背景位移折射（feTurbulence→位移） -->
<svg width="0" height="0" aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden">
  <defs>
    <filter id="lg-refract" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.013 0.015" numOctaves="2" seed="4" result="noise"/>
      <feGaussianBlur in="noise" stdDeviation="1.1" result="snoise"/>
      <feDisplacementMap in="SourceGraphic" in2="snoise" scale="13" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>
<div class="app">
  <header class="topbar">
    <div class="topbar-inner">
      <h1 id="viewTitle">实验台</h1>
      <p id="viewSub" class="subtitle"></p>
    </div>
  </header>

  <main class="content">
    <section class="view" id="view-overview"></section>
    <section class="view hide" id="view-experiments"></section>
    <section class="view hide" id="view-reagents"></section>
    <section class="view hide" id="view-tools"></section>
    <section class="view hide" id="view-more"></section>
  </main>

  <nav class="tabbar">
    <button class="tab active" data-view="overview">
      <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      <span>概览</span>
    </button>
    <button class="tab" data-view="experiments">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/><path d="M8 3v18"/><path d="M11 8h5"/><path d="M11 12h5"/><path d="M11 16h3"/></svg>
      <span>记录</span>
    </button>
    <button class="tab" data-view="reagents">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2h6"/><path d="M10 2v10L6.5 18a2.5 2.5 0 0 0 2.2 3.5h6.6A2.5 2.5 0 0 0 17.5 18L14 12V2"/><path d="M7.8 15h8.4"/></svg>
      <span>试剂</span>
    </button>
    <button class="tab" data-view="tools">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span>工具</span>
    </button>
    <button class="tab" data-view="more">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>
      <span>更多</span>
    </button>
  </nav>

  <button class="fab" id="fab" aria-label="新建">+</button>

  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="sheet" id="sheet"></div>

  <div class="modal-backdrop" id="modalBackdrop"></div>
  <div class="modal" id="modal"></div>

  <div class="alarm-overlay" id="alarmOverlay">
    <div class="alarm-card">
      <div class="alarm-ico">⏰</div>
      <div class="alarm-title">时间到</div>
      <div class="alarm-label" id="alarmLabel"></div>
      <button class="btn danger" onclick="stopAlarm()">我知道了</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>
</div>
<script src="qrcode.js"></script>
<script src="app.js"></script>
<!-- Cloudflare Web Analytics --><script type='module' src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "ad7bec2e777c4d35af5cc3a217bdf344"}'></script><!-- End Cloudflare Web Analytics -->
</body>
</html>
