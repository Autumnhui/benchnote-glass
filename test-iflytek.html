<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>讯飞语音听写 · 测试</title>
<style>
  :root { --blue:#007aff; --bg:#f2f2f7; --card:#ffffff; --text:#1c1c1e; --sub:#8e8e93; --red:#ff3b30; --green:#34c759; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; }
  body { font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Helvetica Neue",Arial,sans-serif; background:var(--bg); color:var(--text); display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { width:100%; max-width:480px; background:var(--card); border-radius:22px; padding:28px; box-shadow:0 12px 40px rgba(0,0,0,.08); }
  h1 { font-size:20px; margin:0 0 4px; }
  .sub { font-size:13px; color:var(--sub); margin:0 0 20px; line-height:1.5; }
  .status { display:inline-block; font-size:12px; padding:4px 10px; border-radius:99px; background:#e9e9ee; color:var(--sub); margin-bottom:18px; }
  .status.on { background:rgba(52,199,89,.15); color:var(--green); }
  .status.err { background:rgba(255,59,48,.12); color:var(--red); }
  .mic { width:84px; height:84px; border-radius:50%; border:0; background:var(--blue); color:#fff; display:flex; align-items:center; justify-content:center; margin:0 auto 12px; cursor:pointer; transition:transform .15s, box-shadow .2s; box-shadow:0 8px 20px rgba(0,122,255,.35); }
  .mic:active { transform:scale(.94); }
  .mic.rec { background:var(--red); box-shadow:0 8px 20px rgba(255,59,48,.4); animation:pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
  .mic svg { width:38px; height:38px; fill:#fff; }
  .label { text-align:center; font-size:13px; color:var(--sub); margin-bottom:18px; }
  .out { width:100%; min-height:120px; border:1px solid #e3e3e8; border-radius:14px; padding:14px; font-size:15px; line-height:1.6; white-space:pre-wrap; word-break:break-word; background:#fafafa; }
  .out:empty:before { content:"识别结果将显示在这里…"; color:#b8b8be; }
  .row { display:flex; gap:10px; margin-top:14px; }
  .btn { flex:1; padding:11px; border-radius:12px; border:0; font-size:14px; cursor:pointer; background:#e9e9ee; color:var(--text); }
  .btn.primary { background:var(--blue); color:#fff; }
</style>
</head>
<body>
  <div class="card">
    <h1>讯飞语音听写 · 测试</h1>
    <p class="sub">纯前端 WebSocket 直连，无需后端。点击麦克风开始说话，再次点击结束。需 localhost 或 https 且授权麦克风。</p>
    <div class="status" id="status">未连接</div>
    <button class="mic" id="mic">
      <svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0" fill="none" stroke="#fff" stroke-width="2"/><path d="M12 18v3" fill="none" stroke="#fff" stroke-width="2"/></svg>
    </button>
    <div class="label" id="label">点击开始录音</div>
    <div class="out" id="out"></div>
    <div class="row">
      <button class="btn" id="clear">清空</button>
      <button class="btn primary" id="copy">复制结果</button>
    </div>
  </div>

<script>
// ===== 讯飞凭证（纯前端会暴露在源码中，仅适合内网/个人使用） =====
const IFLYTEK = {
  APPID: 'd22da095',
  APIKey: '588473a2370b372e87fb161bbe0f8d2a',
  APISecret: 'ZjQyOTEzNGM1MTc5M2IxM2UzOWQzN2Nh'
};

const $ = (id) => document.getElementById(id);
const mic = $('mic'), label = $('label'), out = $('out'), status = $('status');

function setStatus(text, cls) { status.textContent = text; status.className = 'status' + (cls ? ' ' + cls : ''); }

function base64Bytes(bytes) {
  let bin = ''; for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}
async function iflytekAuthUrl() {
  const host = 'iat-api.xfyun.cn';
  const date = new Date().toUTCString();
  const reqLine = 'GET /v2/iat HTTP/1.1';
  const origin = `host: ${host}\ndate: ${date}\n${reqLine}`;
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey('raw', enc.encode(IFLYTEK.APISecret), { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
  const sig = new Uint8Array(await crypto.subtle.sign('HMAC', key, enc.encode(origin)));
  const signature = base64Bytes(sig);
  const authOrigin = `api_key="${IFLYTEK.APIKey}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
  const authorization = base64Bytes(enc.encode(authOrigin));
  return `wss://${host}/v2/iat?authorization=${encodeURIComponent(authorization)}&date=${encodeURIComponent(date)}&host=${host}`;
}

let ctx, stream, proc, ws, timer, buf = [], first = true, sending = false;

async function start() {
  if (!window.crypto || !crypto.subtle) { setStatus('需 https 或 localhost（crypto.subtle 不可用）', 'err'); return; }
  sending = true;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, sampleRate: 16000 } });
  } catch (e) { sending = false; setStatus('麦克风授权失败', 'err'); return; }
  setStatus('连接中…');
  const AC = window.AudioContext || window.webkitAudioContext;
  ctx = new AC();
  const src = ctx.createMediaStreamSource(stream);
  proc = ctx.createScriptProcessor(4096, 1, 1);
  proc.onaudioprocess = (e) => { buf.push(new Float32Array(e.inputBuffer.getChannelData(0))); };
  src.connect(proc); proc.connect(ctx.destination);
  mic.classList.add('rec'); label.textContent = '正在聆听…再次点击结束';
  try {
    ws = new WebSocket(await iflytekAuthUrl());
  } catch (e) { setStatus('连接失败', 'err'); stop(); return; }
  ws.onopen = () => { setStatus('聆听中', 'on'); timer = setInterval(flush, 40); };
  ws.onmessage = (ev) => {
    try {
      const j = JSON.parse(ev.data);
      if (j.code !== 0) { setStatus('错误 ' + j.code + '：' + j.message, 'err'); stop(); return; }
      const r = j.data && j.data.result;
      if (r && r.ws) {
        let t = ''; r.ws.forEach((w) => w.cw && w.cw.forEach((c) => t += c.w));
        if (t) out.textContent += t;
      }
    } catch (e) { setStatus('响应解析失败', 'err'); }
  };
  ws.onerror = () => { setStatus('WebSocket 异常', 'err'); };
  ws.onclose = () => { if (sending) setStatus('已结束'); };
}

function flush() {
  if (!buf.length) return;
  let len = 0; buf.forEach((c) => len += c.length);
  const flat = new Float32Array(len); let o = 0; buf.forEach((c) => { flat.set(c, o); o += c.length; });
  buf = [];
  const ctxRate = ctx ? ctx.sampleRate : 16000;
  const ratio = ctxRate / 16000, n = Math.round(flat.length / ratio), pcm = new Int16Array(n);
  for (let i = 0; i < n; i++) { const s = Math.max(-1, Math.min(1, flat[Math.min(flat.length - 1, Math.floor(i * ratio))]));
    pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF; }
  const statusFlag = first ? 0 : 1; first = false;
  const b64 = base64Bytes(new Uint8Array(pcm.buffer));
  const frame = { data: { status: statusFlag, format: 'audio/L16;rate=16000', encoding: 'raw', audio: b64 } };
  if (statusFlag === 0) { frame.common = { app_id: IFLYTEK.APPID }; frame.business = { language: 'zh_cn', domain: 'iat', accent: 'mandarin', vad_eos: 2000 }; }
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(frame));
}

function stop() {
  try { if (timer) clearInterval(timer); } catch (e) {}
  try { if (first === false && ws && ws.readyState === 1) ws.send(JSON.stringify({ data: { status: 2 } })); } catch (e) {}
  try { if (ws) ws.close(); } catch (e) {}
  try { if (proc) proc.disconnect(); if (stream) stream.getTracks().forEach((t) => t.stop()); } catch (e) {}
  if (ctx) ctx.close();
  sending = false; first = true; buf = [];
  mic.classList.remove('rec'); label.textContent = '点击开始录音';
}

mic.onclick = () => { if (sending) stop(); else start(); };
$('clear').onclick = () => { out.textContent = ''; };
$('copy').onclick = () => { navigator.clipboard.writeText(out.textContent).then(() => setStatus('已复制', 'on')); };
</script>
</body>
</html>
